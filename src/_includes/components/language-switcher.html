<!-- Language Switcher -->
<div class="language-switcher" id="languageSwitcher">
  <button 
    class="lang-btn" 
    data-lang="en"
    aria-label="Switch to English"
  >
    EN
  </button>
  <button 
    class="lang-btn active" 
    data-lang="es"
    aria-label="Cambiar a Español"
  >
    ES
  </button>
</div>
