<section class="hero" id="top">
  <div class="hero__inner">
    <div class="hero__meta">
      <p class="hero__label">
        <span data-lang-en="(01) — Available for projects" data-lang-es="(01) — Disponible para proyectos">(01) —
          Available for projects</span>
      </p>

      <p class="hero__bio">
        <span data-lang-en="{{ translations.en.hero.about }}" data-lang-es="{{ translations.es.hero.about }}">{{
          translations.en.hero.about }}</span>
      </p>

      <div class="hero__location">
        <span>Base — Barcelona, ES</span>
        <span data-lang-en="Remote — Global" data-lang-es="Remoto — Global">Remote — Global</span>
      </div>
    </div>

    <div class="hero__headline">
      <h1 class="hero__title">
        <span data-lang-en="{{ translations.en.hero.tagline }}" data-lang-es="{{ translations.es.hero.tagline }}">{{
          translations.en.hero.tagline }}</span>
        <span class="hero__typing-text hero__typing-text--loading"
          data-phrases-en="{{ translations.en.hero.accent | join('|') }}"
          data-phrases-es="{{ translations.es.hero.accent | join('|') }}" aria-live="polite">{{
          translations.en.hero.accent[0] }}</span>
      </h1>

      <div class="hero__actions">
        <a href="#projects" class="btn btn--primary">
          <span data-lang-en="{{ translations.en.hero.cta.projects }}"
            data-lang-es="{{ translations.es.hero.cta.projects }}">{{ translations.en.hero.cta.projects }}</span>
          <svg class="btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M7 7l10 10"/>
            <path d="M17 7v10H7"/>
          </svg>
        </a>

        <a href="/assets/curriculum-en.pdf" class="btn btn--outline hero__cv-btn" download
          data-lang-en-href="/assets/curriculum-en.pdf" data-lang-es-href="/assets/curriculum-es.pdf">
          <span data-lang-en="{{ translations.en.hero.cta.cv }}" data-lang-es="{{ translations.es.hero.cta.cv }}">{{
            translations.en.hero.cta.cv }}</span>
          <svg class="btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </a>
      </div>
    </div>
  </div>
</section>
