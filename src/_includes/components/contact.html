<!-- Contact/Footer Section -->
<section class="contact section" id="contact">
  <div class="container">
    <div class="contact__content animate-on-scroll">
      <h2 class="contact__title">
        <span data-lang-en="{{ translations.en.contact.title }}" data-lang-es="{{ translations.es.contact.title }}">{{ translations.en.contact.title }}</span>
      </h2>
      <p class="contact__subtitle">
        <span data-lang-en="{{ translations.en.contact.subtitle }}" data-lang-es="{{ translations.es.contact.subtitle }}">{{ translations.en.contact.subtitle }}</span>
      </p>

      <div class="contact__email">
        <a href="mailto:{{ site.author.email }}" class="email-link">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          {{ site.author.email }}
        </a>
        <button class="copy-btn" data-copy="{{ site.author.email }}" aria-label="Copy email to clipboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <span data-lang-en="{{ translations.en.contact.copy }}" data-lang-es="{{ translations.es.contact.copy }}">{{ translations.en.contact.copy }}</span>
        </button>
      </div>

      <div class="contact__social">
        <p class="contact__social-label">
          <span data-lang-en="{{ translations.en.contact.social }}" data-lang-es="{{ translations.es.contact.social }}">{{ translations.en.contact.social }}</span>
        </p>
        <div class="contact__social-links">
          <a href="{{ site.author.github }}" target="_blank" rel="noopener noreferrer" aria-label="GitHub" class="social-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
          </a>
          <a href="{{ site.author.linkedin }}" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" class="social-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer__content">
      <p class="footer__copyright">
        © 2026 {{ site.name }}. 
        <span data-lang-en="{{ translations.en.footer.rights }}" data-lang-es="{{ translations.es.footer.rights }}">{{ translations.en.footer.rights }}</span>
      </p>
      <p class="footer__built">
        <span data-lang-en="{{ translations.en.footer.builtWith }}" data-lang-es="{{ translations.es.footer.builtWith }}">{{ translations.en.footer.builtWith }}</span>
      </p>
    </div>
  </div>
</footer>
