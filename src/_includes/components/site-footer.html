<footer class="site-footer" id="contacto">
  <div class="site-footer__inner">
    <p class="site-footer__label">
      <span data-lang-en="(05) — Contact" data-lang-es="(05) — Contacto">(05) — Contact</span>
    </p>

    <p class="site-footer__cta">
      <span data-lang-en="Have a project in mind?" data-lang-es="¿Tienes un proyecto en mente?">Have a project in mind?</span>
      <br>
      <a href="mailto:{{ site.author.email }}" class="site-footer__cta-link">
        <span data-lang-en="Let's talk" data-lang-es="Hablemos">Let's talk</span>
      </a>
    </p>

    <div class="site-footer__social">
      <a href="{{ site.author.github }}" target="_blank" rel="noopener noreferrer" class="site-footer__social-link">GitHub</a>
      <a href="{{ site.author.linkedin }}" target="_blank" rel="noopener noreferrer" class="site-footer__social-link">LinkedIn</a>
    </div>

    <div class="site-footer__bottom">
      <span>© 2026 {{ site.name }}</span>
      <span data-lang-en="Designed and built in Barcelona" data-lang-es="Diseñado y construido en Barcelona">Designed and built in Barcelona</span>
    </div>
  </div>
</footer>
