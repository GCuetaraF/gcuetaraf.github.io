<section class="projects section" id="projects">
  <div class="container">
    <h2 class="projects__title animate-on-scroll">
      <span data-lang-en="{{ translations.en.projects.title }}" data-lang-es="{{ translations.es.projects.title }}">{{ translations.en.projects.title }}</span>
    </h2>

    <div class="projects__grid">
      {% for project in projects %}
        <div id="project-{{ project.name }}" class="project-card animate-on-scroll">
          <div class="project-card__content">
            <h3 class="project-card__name">{{ project.name }}</h3>
            <p class="project-card__description">
              <span data-lang-en="{{ project.description.en }}" data-lang-es="{{ project.description.es }}">{{ project.description.en }}</span>
            </p>

            <div class="project-card__tech">
              {% for tech in project.technologies %}
                <span class="tech-tag">{{ tech }}</span>
              {% endfor %}
            </div>
          </div>

          <div class="project-card__links">
            <a href="{{ project.url }}" target="_blank" rel="noopener noreferrer" class="project-link">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
              </svg>
              <span data-lang-en="{{ translations.en.projects.viewSource }}" data-lang-es="{{ translations.es.projects.viewSource }}">{{ translations.en.projects.viewSource }}</span>
            </a>
          </div>
        </div>
      {% endfor %}
    </div>

    <div class="projects__cta animate-on-scroll">
      <a href="{{ site.author.github }}" target="_blank" rel="noopener noreferrer" class="btn btn--secondary">
        <span data-lang-en="{{ translations.en.projects.viewAll }}" data-lang-es="{{ translations.es.projects.viewAll }}">{{ translations.en.projects.viewAll }}</span>
        <svg class="btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14"/>
          <path d="m12 5 7 7-7 7"/>
        </svg>
      </a>
    </div>
  </div>
</section>
