{% macro article(id, startYear, endYear, url, altText, companyName) %}
  <article id="{{ id }}">
    <div class="dates">
      <time datetime="{{ startYear }}">{{ startYear }}</time> - <time datetime="{{ endYear }}">{{ endYear }}</time>
    </div>
    <div class="heading">
      <a href="{{ url }}" alt="{{ altText }}" target="_blank">
        <h3>{{ companyName }}</h3>
        <span class="icon">🔗</span>
      </a>
    </div>

    {{ caller() }}
  </article>
{% endmacro %}
