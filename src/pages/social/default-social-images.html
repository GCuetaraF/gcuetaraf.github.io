---
permalink: /social/
eleventyExcludeFromCollections: true
---
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>{{ site.name }} - Social Card</title>
    <style>
      :root {
        --w: 1200px;
        --h: 630px;

        /* Warm editorial palette (matching portfolio dark mode) */
        --color-primary: #c86842;
        --color-primary-light: #d98060;
        --color-surface-0: #231f1b;
        --color-surface-3: #3d3733;
        --color-text-primary: #ece8e2;
        --color-text-secondary: #c4bdb5;
        --color-text-tertiary: #a09993;
        --font-serif: 'Georgia', serif;
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: ui-monospace, 'SF Mono', monospace;
      }

      body,
      html {
        height: 100%;
        margin: 0;
        background: var(--color-surface-0);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
      }

      .card {
        width: var(--w);
        height: var(--h);
        background: var(--color-surface-0);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
      }

      /* Subtle warm grid background */
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          linear-gradient(rgba(200, 104, 66, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(200, 104, 66, 0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
        -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
        z-index: 0;
      }

      .card__content {
        position: relative;
        z-index: 2;
      }

      .label {
        font-family: var(--font-mono);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--color-primary);
        margin-bottom: 24px;
      }

      .name {
        font-family: var(--font-serif);
        font-size: 88px;
        font-weight: 400;
        font-style: italic;
        line-height: 1.05;
        margin: 0 0 24px;
        color: var(--color-text-primary);
      }

      .tagline {
        font-size: 32px;
        color: var(--color-text-secondary);
        margin: 0;
        font-weight: 400;
        max-width: 800px;
        line-height: 1.3;
      }

      /* Warm gradient decoration */
      .decoration {
        position: absolute;
        top: 0;
        right: 0;
        width: 50%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .decoration__gradient {
        position: absolute;
        top: 15%;
        right: -5%;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, var(--color-primary) 0%, transparent 70%);
        opacity: 0.08;
        filter: blur(80px);
      }

      .footer {
        position: absolute;
        bottom: 60px;
        left: 80px;
        right: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 2;
        padding-top: 24px;
        border-top: 1px solid var(--color-surface-3);
      }

      .footer__site {
        font-family: var(--font-mono);
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--color-text-tertiary);
      }

      .footer__logo {
        font-family: var(--font-serif);
        font-size: 42px;
        font-style: italic;
        color: var(--color-primary);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="decoration">
        <div class="decoration__gradient"></div>
      </div>

      <div class="card__content">
        <p class="label">Senior Frontend Engineer</p>
        <h1 class="name">{{ site.name }}</h1>
        <p class="tagline">{{ site.description }}</p>
      </div>

      <div class="footer">
        <span class="footer__site">{{ site.url | replace("https://", "") | replace("http://", "") | replace("/", "") }}</span>
        <span class="footer__logo">GC</span>
      </div>
    </div>
  </body>
</html>
